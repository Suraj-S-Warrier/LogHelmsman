apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: log-parser-hpa
  namespace: monitoring-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: log-parser
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50